configuration:
  gdrive_enabled:
    name: Cópia de segurança no Google Drive
    description: Enviar cópias de segurança do cofre em JSON automaticamente para o Google Drive.
  gdrive_folder_id:
    name: ID da pasta do Google Drive
    description: ID da pasta de destino para as cópias (crie uma pasta dedicada primeiro).
  gdrive_client_id:
    name: ID do cliente OAuth
    description: ID do cliente OAuth 2.0 do Google Cloud para a API Drive.
  gdrive_client_secret:
    name: Segredo do cliente OAuth
    description: Segredo do cliente OAuth 2.0 do Google Cloud.
  gdrive_refresh_token:
    name: Token de actualização OAuth
    description: Token de actualização de longa duração com âmbito drive.file.
  backup_interval_hours:
    name: Intervalo de cópia (horas)
    description: Com que frequência enviar uma cópia quando o Drive está activado.
  backup_keep_count:
    name: Cópias a manter
    description: Número máximo de ficheiros de cópia de segurança mantidos no Google Drive.

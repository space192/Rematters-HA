configuration:
  gdrive_enabled:
    name: Google Drive backup
    description: Automatically upload vault JSON backups to Google Drive.
  gdrive_folder_id:
    name: Google Drive folder ID
    description: Target folder ID for backups (create a dedicated folder first).
  gdrive_client_id:
    name: OAuth Client ID
    description: Google Cloud OAuth 2.0 client ID for Drive API.
  gdrive_client_secret:
    name: OAuth Client Secret
    description: Google Cloud OAuth 2.0 client secret.
  gdrive_refresh_token:
    name: OAuth Refresh Token
    description: Long-lived refresh token with drive.file scope.
  backup_interval_hours:
    name: Backup interval (hours)
    description: How often to upload a backup when Drive is enabled.
  backup_keep_count:
    name: Backups to retain
    description: Maximum number of backup files kept in Google Drive.

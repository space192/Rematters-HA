name: Rematters
version: "0.1.12"
slug: rematters
description: Store and organize Matter pairing codes and QR payloads. Export JSON and back up to Google Drive.
url: https://github.com/Rematters/Rematters-HA
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_admin: false
panel_icon: mdi:qrcode-scan
panel_title: Rematters
homeassistant_api: true
auth_api: false
hassio_api: false
map:
  - type: addon_config
    read_only: false
  - type: backup
    read_only: false
options:
  gdrive_enabled: false
  gdrive_folder_id: ""
  gdrive_client_id: ""
  gdrive_client_secret: ""
  gdrive_refresh_token: ""
  backup_interval_hours: 24
  backup_keep_count: 10
  cloud_enabled: true
  cloud_url: "https://rematters.casa"
  cloud_token: ""
schema:
  gdrive_enabled: bool
  gdrive_folder_id: str?
  gdrive_client_id: password?
  gdrive_client_secret: password?
  gdrive_refresh_token: password?
  backup_interval_hours: int(1,168)?
  backup_keep_count: int(1,100)?
  cloud_enabled: bool
  cloud_url: url?
  cloud_token: password?
